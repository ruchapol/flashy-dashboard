version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: flashy-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: flashy_dashboard
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashy-backend
    depends_on:
      - mongo
    environment:
      # Override YAML mongo_uri so the backend talks to the mongo container
      FLASHY_MONGO_URI: mongodb://mongo:27017
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  backend_batch:
    build:
      context: ./backend
      dockerfile: Dockerfile.batch
    container_name: flashy-backend-batch
    depends_on:
      - mongo
    environment:
      FLASHY_MONGO_URI: mongodb://mongo:27017
    profiles: ["batch"]

  backend_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    container_name: flashy-backend-scheduler
    depends_on:
      - mongo
    environment:
      FLASHY_MONGO_URI: mongodb://mongo:27017
    profiles: ["scheduler"]

volumes:
  mongo_data:

