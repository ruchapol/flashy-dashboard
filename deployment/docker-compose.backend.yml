version: "3.9"

services:
  backend:
    image: flashy-backend:latest
    container_name: flashy-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Docker Desktop (Windows/Mac) supports this hostname by default.
      # On Linux, extra_hosts below makes it work on modern Docker.
      FLASHY_MONGO_URI: mongodb://host.docker.internal:27017
    extra_hosts:
      - "host.docker.internal:host-gateway"

