version: "3.9"

services:
  frontend:
    image: flashy-frontend:latest
    container_name: flashy-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      # Backend URL for nginx /api proxy (backend on host; use backend:8000 if in same compose)
      BACKEND_URL: http://host.docker.internal:8000

